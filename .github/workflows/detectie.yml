name: Refresh detectie

on:
  workflow_dispatch:
  schedule:
    - cron: "0 18 * * 0"

permissions:
  contents: write

jobs:
  refresh-detectie:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run DetectieAgent
        run: python agents/detectie_agent.py

      - name: Commit updated detectie data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/detectie.json
          git diff --cached --quiet && exit 0
          git commit -m "Refresh detectie data"
          git push
