<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#091017">
    <title>BobOS Nieuws</title>
    <script>
        (function () {
            try {
                const savedTheme = localStorage.getItem("bobos-theme");
                document.documentElement.dataset.theme = savedTheme === "light" ? "light" : "dark";
            } catch (error) {
                document.documentElement.dataset.theme = "dark";
            }
        }());
    </script>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js" defer></script>
    <script src="script.js" defer></script>
</head>
<body class="news-page" data-page="news">
    <div class="app-shell">
        <main class="news-layout">
            <header class="page-panel">
                <div class="page-top-row">
                    <a class="back-link" href="./index.html">
                        <i data-lucide="arrow-left"></i>
                        <span>Terug</span>
                    </a>
                    <div class="page-actions">
                        <button class="theme-toggle" type="button" data-theme-toggle aria-pressed="false">
                            <i data-theme-icon data-lucide="sun"></i>
                        </button>
                        <img class="page-logo" src="assets/bobos-logo-dark.svg" data-bobos-logo alt="BobOS logo">
                    </div>
                </div>

                <div class="page-heading">
                    <h1>Meer nieuws</h1>
                    <p class="page-intro">Compact overzicht. Elke regel opent direct de originele bron in een nieuwe tab.</p>
                </div>
            </header>

            <section id="news-list" class="news-full-list" aria-label="Nieuwsberichten">
                <div class="status-card">Nieuws wordt geladen...</div>
            </section>
        </main>
    </div>
</body>
</html>
