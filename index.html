<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#091017">
    <title>BobOS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
        (function () {
            try {
                const savedTheme = localStorage.getItem("bobos-theme");
                document.documentElement.dataset.theme = savedTheme === "light" ? "light" : "dark";
            } catch (error) {
                document.documentElement.dataset.theme = "dark";
            }
        }());
    </script>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js" defer></script>
    <script src="script.js" defer></script>
</head>
<body class="dashboard-page" data-page="dashboard">
    <div class="app-shell">
        <main class="dashboard-layout">
            <header class="page-panel app-header">
                <div class="page-top-row">
                    <a class="brand-home" href="index.html" aria-label="BobOS dashboard">
                        <span class="brand-wordmark">Bob<span>OS</span></span>
                        <span class="brand-subtitle">Persoonlijk dashboard</span>
                    </a>
                    <button class="theme-toggle" type="button" data-theme-toggle aria-pressed="false">
                        <i data-theme-icon data-lucide="sun"></i>
                    </button>
                </div>

                <div class="dashboard-nav-wrap">
                    <nav class="dashboard-nav" aria-label="Agentnavigatie">
                        <a class="dashboard-nav-link dashboard-nav-link--sport" href="sport.html" data-nav-target="sport">
                            <span class="dashboard-nav-icon"><i data-lucide="trophy"></i></span>
                            <span class="dashboard-nav-label">Sport</span>
                        </a>
                        <a class="dashboard-nav-link dashboard-nav-link--detectie" href="detectie.html" data-nav-target="detectie">
                            <span class="dashboard-nav-icon"><i data-lucide="map"></i></span>
                            <span class="dashboard-nav-label">Detectie</span>
                        </a>
                        <a class="dashboard-nav-link dashboard-nav-link--vissen" href="vissen.html" data-nav-target="vissen">
                            <span class="dashboard-nav-icon"><i data-lucide="fish"></i></span>
                            <span class="dashboard-nav-label">Vissen</span>
                        </a>
                        <a class="dashboard-nav-link dashboard-nav-link--steentijd" href="https://steentijd-app.pages.dev/" data-nav-target="steentijd">
                            <span class="dashboard-nav-icon"><i data-lucide="landmark"></i></span>
                            <span class="dashboard-nav-label">Steentijd</span>
                        </a>
                        <a class="dashboard-nav-link dashboard-nav-link--more" href="meer.html" data-nav-target="meer">
                            <span class="dashboard-nav-icon"><i data-lucide="grid-2x2-plus"></i></span>
                            <span class="dashboard-nav-label">Meer</span>
                        </a>
                    </nav>
                </div>
            </header>

            <section class="news-panel" aria-labelledby="dashboard-news-title">
                <div class="section-heading">
                    <h2 id="dashboard-news-title">Nieuws</h2>
                </div>

                <div id="dashboard-news-list" class="news-compact-list" aria-live="polite">
                    <div class="status-card">Nieuws wordt geladen...</div>
                </div>
            </section>
        </main>

        <footer class="app-footer">
            <p class="app-version" data-app-version>Versie 0.2</p>
        </footer>
    </div>
</body>
</html>
