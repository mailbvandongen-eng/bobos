<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#091017">
    <title>BobOS SportAgent</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
        (function () {
            try {
                const savedTheme = localStorage.getItem("bobos-theme");
                document.documentElement.dataset.theme = savedTheme === "light" ? "light" : "dark";
            } catch (error) {
                document.documentElement.dataset.theme = "dark";
            }
        }());
    </script>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js" defer></script>
    <script src="config.js" defer></script>
    <script src="script.js" defer></script>
</head>
<body class="agent-page" data-page="agent-sport">
    <div class="app-shell">
        <main class="agent-layout">
            <header class="page-panel app-header">
                <div class="page-top-row">
                    <a class="brand-home" href="index.html" aria-label="BobOS dashboard">
                        <span class="brand-wordmark">Bob<span>OS</span></span>
                        <span class="brand-subtitle">Persoonlijk dashboard</span>
                    </a>
                    <button class="theme-toggle" type="button" data-theme-toggle aria-pressed="false">
                        <i data-theme-icon data-lucide="sun"></i>
                    </button>
                </div>

                <div class="dashboard-nav-wrap">
                    <nav class="dashboard-nav" aria-label="Agentnavigatie">
                        <a class="dashboard-nav-link dashboard-nav-link--sport" href="sport.html" data-nav-target="sport" aria-current="page">
                            <span class="dashboard-nav-icon"><i data-lucide="trophy"></i></span>
                            <span class="dashboard-nav-label">Sport</span>
                        </a>
                        <a class="dashboard-nav-link dashboard-nav-link--detectie" href="detectie.html" data-nav-target="detectie">
                            <span class="dashboard-nav-icon"><i data-lucide="map"></i></span>
                            <span class="dashboard-nav-label">Detectie</span>
                        </a>
                        <a class="dashboard-nav-link dashboard-nav-link--vissen" href="vissen.html" data-nav-target="vissen">
                            <span class="dashboard-nav-icon"><i data-lucide="fish"></i></span>
                            <span class="dashboard-nav-label">Vissen</span>
                        </a>
                        <a class="dashboard-nav-link dashboard-nav-link--steentijd" href="https://steentijd-app.pages.dev/" data-nav-target="steentijd">
                            <span class="dashboard-nav-icon"><i data-lucide="landmark"></i></span>
                            <span class="dashboard-nav-label">Steentijd</span>
                        </a>
                        <a class="dashboard-nav-link dashboard-nav-link--more" href="meer.html" data-nav-target="meer">
                            <span class="dashboard-nav-icon"><i data-lucide="grid-2x2-plus"></i></span>
                            <span class="dashboard-nav-label">Meer</span>
                        </a>
                    </nav>
                </div>
            </header>

            <section class="page-panel agent-panel agent-panel--sport" data-agent-key="sport">
                <div class="agent-panel-head">
                    <div class="agent-panel-top-row">
                        <div class="agent-panel-title">
                            <h1>SportAgent</h1>
                        </div>
                        <div class="agent-panel-actions">
                            <a class="agent-open-link agent-open-link--inline" data-agent-open-link href="https://mailbvandongen-eng.github.io/sport-op-tv/" target="_blank" rel="noopener noreferrer">
                                <span data-agent-open-label>Open Sport op TV</span>
                                <i data-lucide="arrow-up-right"></i>
                            </a>
                            <button class="refresh-action-button" type="button" data-workflow-target="sport" aria-label="Sport verversen">
                                <i data-lucide="refresh-cw"></i>
                            </button>
                        </div>
                    </div>
                    <p class="refresh-feedback" data-refresh-feedback="sport" aria-live="polite" hidden></p>
                    <p class="agent-status-badge"><i data-lucide="activity"></i><span data-agent-status>Sportdata laden...</span></p>
                    <p class="agent-score-line" data-agent-score hidden></p>
                </div>

                <div class="agent-section-grid">
                    <article class="agent-section-card agent-section-card--primary">
                        <h2><i data-lucide="scan-search"></i><span>Analyse</span></h2>
                        <div data-agent-analysis>
                            <p>Analyse wordt geladen...</p>
                        </div>
                    </article>
                    <article class="agent-section-card">
                        <h2><i data-lucide="lightbulb"></i><span>Advies</span></h2>
                        <div data-agent-advice>
                            <p>Advies wordt geladen...</p>
                        </div>
                    </article>
                    <article class="agent-section-card">
                        <h2><i data-lucide="book-open"></i><span>Bronnen</span></h2>
                        <div data-agent-sources>
                            <p>Bronnen worden geladen...</p>
                        </div>
                    </article>
                </div>

            </section>
        </main>

        <footer class="app-footer">
            <p class="app-version" data-app-version>Versie 0.2</p>
        </footer>
    </div>
</body>
</html>
